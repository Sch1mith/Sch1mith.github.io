<!DOCTYPE html>
<html lang="pt-BR">
	<head>
		<title>ciclo</title>
		<meta charset="UTF-8">
		<link rel="stylesheet" href="./index.css">
	</head>

	<body>
		<div style="width: 20px; height: 20px; overflow: clip">
			<div style="display: inline-flex; height: 20px; position: relative; cursor: pointer">
				<details>
					<summary style="background: #01F909; position: absolute; list-style: none;
									width: calc(20px * 9); height: 20px; left: calc(100% - 160px)">
					</summary>
					<div style="width: 20px;"></div>
				</details>
				<details>
					<summary style="background: #009E75; position: absolute; list-style: none;
									width: calc(20px * 7); height: 20px; left: calc(100% - 160px + 20px)">
					</summary>
					<div style="width: 20px;"></div>
				</details>
				<details>
					<summary style="background: #E45BD9; position: absolute; list-style: none;
									width: calc(20px * 5); height: 20px; left: calc(100% - 160px + 40px)">
					</summary>
					<div style="width: 20px;"></div>
				</details>
				<details>
					<summary style="background: #3F55C6; position: absolute; list-style: none;
									width: calc(20px * 3); height: 20px; left: calc(100% - 160px + 60px)">
					</summary>
					<div style="width: 20px;"></div>
				</details>
				<details>
					<summary style="background: #635589; position: absolute; list-style: none;
									width: calc(20px); height: 20px; left: calc(100% - 160px + 80px)">
					</summary>
					<div style="width: 80px;"></div>
				</details>
			</div>
		</div>
	</body>
</html>
